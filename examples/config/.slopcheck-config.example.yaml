ignored_paths:
  - ".git/**"
  - ".venv/**"
  - "dist/**"
  - "build/**"
  - "node_modules/**"

rules:
  placeholder_tokens:
    enabled: true
    banned_tokens:
      - TODO
      - FIXME
      - HACK
      - TEMPORARY

  forbidden_import_edges:
    enabled: true
    boundaries:
      - source_glob: "src/controllers/**/*.py"
        forbidden_prefixes:
          - "src.db"
          - "src.persistence"
        message: "Controllers must not import the DB layer directly."
